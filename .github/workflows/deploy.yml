name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy to EC2
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='node_modules' --exclude='.git' --exclude='.env'
          path: ./
          remote_path: /home/ubuntu/nestquest-v2/
          remote_host: ${{ secrets.EC2_HOST }}
          remote_user: ubuntu
          remote_key: ${{ secrets.EC2_SSH_KEY }}

      - name: Install deps and restart on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd /home/ubuntu/nestquest-v2
            export $(cat .env | grep -v '^#' | xargs)
            # Install ALL deps (including drizzle-kit) so the migration can run
            npm ci
            # Apply schema changes
            npx drizzle-kit push --force || { echo "drizzle-kit push failed"; exit 1; }
            # Apply any pending raw-SQL migrations (idempotent — uses IF NOT EXISTS)
            for f in scripts/migrate-*.sql; do
              [ -f "$f" ] && psql "$DATABASE_URL" -f "$f" || true
            done
            # Now drop devDependencies for production runtime
            npm prune --omit=dev
            pm2 reload nestquest --update-env || pm2 start ecosystem.config.cjs --env production
            pm2 save
